version: '3.8'

services:

  # ─────────────────────────────────────────
  # ZOOKEEPER (required by Kafka)
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - streaming-net

  # ─────────────────────────────────────────
  # KAFKA (message broker)
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - streaming-net

  # ─────────────────────────────────────────
  # POSTGRESQL (data storage)
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: streamuser
      POSTGRES_PASSWORD: streampass
      POSTGRES_DB: streamdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamuser -d streamdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streaming-net

  # ─────────────────────────────────────────
  # CRYPTO PRODUCER (CoinGecko → Kafka)
  # ─────────────────────────────────────────
  producer:
    build: ./producer
    container_name: crypto-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: crypto-prices
      POLL_INTERVAL_SECONDS: "10"
    restart: unless-stopped
    networks:
      - streaming-net

  # ─────────────────────────────────────────
  # CRYPTO CONSUMER (Kafka → PostgreSQL)
  # ─────────────────────────────────────────
  consumer:
    build: ./consumer
    container_name: crypto-consumer
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: crypto-prices
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: streamdb
      DB_USER: streamuser
      DB_PASSWORD: streampass
    restart: unless-stopped
    networks:
      - streaming-net

  # ─────────────────────────────────────────
  # APACHE SPARK (stream processing)
  # ─────────────────────────────────────────
  spark-master:
    image: bitnami/spark:3.5
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - streaming-net

  spark-worker:
    image: bitnami/spark:3.5
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    networks:
      - streaming-net

  # Submits the streaming job to the Spark cluster.
  # Restarts automatically if the job crashes.
  spark-submit:
    image: bitnami/spark:3.5
    container_name: spark-submit
    depends_on:
      - spark-master
      - spark-worker
      - kafka
      - postgres
    environment:
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: crypto-prices
      CHECKPOINT_DIR: /tmp/spark-checkpoints/crypto
      JDBC_URL: jdbc:postgresql://postgres:5432/streamdb
      DB_USER: streamuser
      DB_PASSWORD: streampass
      ANOMALY_THRESHOLD_PCT: "10.0"
    command: >
      spark-submit
      --master spark://spark-master:7077
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.postgresql:postgresql:42.7.1
      --conf spark.sql.shuffle.partitions=4
      /opt/spark-jobs/stream_processor.py
    volumes:
      - ./spark_jobs:/opt/spark-jobs
    restart: unless-stopped
    networks:
      - streaming-net

  # ─────────────────────────────────────────
  # APACHE AIRFLOW (orchestration)
  # ─────────────────────────────────────────
  airflow:
    image: apache/airflow:2.8.0
    container_name: airflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://streamuser:streampass@postgres/streamdb
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    networks:
      - streaming-net

  # ─────────────────────────────────────────
  # GRAFANA (visualization dashboard)
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - streaming-net

# ─────────────────────────────────────────
# VOLUMES & NETWORKS
# ─────────────────────────────────────────
volumes:
  postgres_data:
  grafana_data:

networks:
  streaming-net:
    driver: bridge
